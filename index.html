<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>MICROmanagement</title>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>

  <a href="https://arsidee.github.io/Portfolio-Frontend-App/">Home</a>

  <main>
    <h1>MICROmanagement</h1>
    <p class="subtitle">Can you identify the microorganism?</p>

    <div id="layout">

      <div id="word-bank">
        <h2>Word Bank</h2>
        <ul id="word-list">
          <li>Bacillus anthracis</li>
          <li>E. coli</li>
          <li>Mycobacterium tuberculosis</li>
          <li>Staphylococcus aureus</li>
          <li>Streptococcus</li>
        </ul>
      </div>

      <div id="game-area">
        <div id="image-container">
          <img id="micro-image" src="" alt="Microorganism image">
          <p id="image-placeholder">[ Image will appear here ]</p>
        </div>

        <div id="guess-area">
          <label for="guess-input">Your answer:</label>
          <input id="guess-input" type="text" placeholder="Type the organism name...">
          <button id="submit-btn">Check</button>
          <button id="next-btn">Next</button>
        </div>

        <p id="feedback"></p>

        <div id="score-area">
          <span>Score: <strong id="score">0</strong></span>
          <span>/ <strong id="total">0</strong></span>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
