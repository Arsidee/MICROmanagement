<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>MICROmanagement</title>
  <link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>

  <a href="https://arsidee.github.io/Portfolio-Frontend-App/">Home</a>

  <main>
    <h1>MICROmanagement</h1>
    <p class="subtitle">Can you identify the microorganism?</p>

    <div id="game-screen">
      <div id="layout">

        <div id="word-bank">
          <h2>Word Bank</h2>
          <ul id="word-list">
            <li>Bacillus anthracis</li>
            <li>E. coli</li>
            <li>Mycobacterium tuberculosis</li>
            <li>Staphylococcus aureus</li>
            <li>Streptococcus</li>
          </ul>
        </div>

        <div id="game-area">
          <div id="image-container">
            <img id="micro-image" src="" alt="Microorganism image">
            <p id="image-placeholder">[ Image will appear here ]</p>
          </div>

          <div id="timer-area">
            Time: <strong id="timer-display">15</strong>s
          </div>

          <div id="choices"></div>

          <p id="feedback"></p>

          <div id="score-area">
            <span>Question: <strong id="question-num">1</strong> / 5</span>
            <span id="streak-display"></span>
          </div>

          <button id="next-btn" style="display:none;">Next</button>
        </div>

      </div>
    </div>

    <div id="complete-screen" style="display:none;">
      <h2>Complete!</h2>
      <p id="final-score"></p>

      <div id="missed-section" style="display:none;">
        <h3>Missed:</h3>
        <ul id="missed-list"></ul>
      </div>

      <div id="correct-section">
        <h3>Correct:</h3>
        <ul id="correct-list"></ul>
      </div>

      <br>
      <button id="reset-btn">Play Again</button>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
